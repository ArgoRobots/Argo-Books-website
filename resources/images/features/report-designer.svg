<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="rdBg" x1="0" y1="0" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="rdShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="rdPage" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="600" height="500" rx="24" fill="url(#rdBg)"/>
  <g opacity="0.03" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
  </g>
  <circle cx="540" cy="70" r="45" fill="#7c3aed" opacity="0.04"/>
  <circle cx="60" cy="430" r="35" fill="#3b82f6" opacity="0.04"/>

  <g filter="url(#rdShadow)">
    <rect x="32" y="24" width="536" height="452" rx="16" fill="white"/>
  </g>

  <!-- Step wizard -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <line x1="215" y1="52" x2="258" y2="52" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="338" y1="52" x2="382" y2="52" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="140" cy="52" r="11" fill="#3b82f6"/>
    <polyline points="135,52 139,56 145,48" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="157" y="52" font-size="11" font-weight="600" fill="#475569" dominant-baseline="central">Template</text>
    <circle cx="274" cy="52" r="11" fill="#3b82f6"/>
    <text x="274" y="52" font-size="11" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">2</text>
    <text x="291" y="52" font-size="11" font-weight="700" fill="#1e293b" dominant-baseline="central">Layout</text>
    <circle cx="396" cy="52" r="11" fill="#e2e8f0"/>
    <text x="396" y="52" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">3</text>
    <text x="413" y="52" font-size="11" font-weight="600" fill="#94a3b8" dominant-baseline="central">Preview</text>
  </g>
  <line x1="48" y1="76" x2="552" y2="76" stroke="#f1f5f9" stroke-width="1"/>

  <!-- LEFT: Elements panel -->
  <rect x="48" y="84" width="104" height="380" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="0.5" fill="#94a3b8">ELEMENTS</text>
  <g font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="500" fill="#475569">
    <!-- Chart -->
    <rect x="58" y="112" width="20" height="20" rx="5" fill="#3b82f6"/>
    <g stroke="white" stroke-width="2" stroke-linecap="round"><line x1="63" y1="126" x2="63" y2="123"/><line x1="68" y1="126" x2="68" y2="119"/><line x1="73" y1="126" x2="73" y2="121"/></g>
    <text x="84" y="122" dominant-baseline="central">Chart</text>
    <!-- Label -->
    <rect x="58" y="140" width="20" height="20" rx="5" fill="#7c3aed"/>
    <text x="68" y="150" font-size="11" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">T</text>
    <text x="84" y="150" dominant-baseline="central">Label</text>
    <!-- Date Range -->
    <rect x="58" y="168" width="20" height="20" rx="5" fill="#16a34a"/>
    <rect x="63" y="173" width="10" height="9" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/><line x1="63" y1="176" x2="73" y2="176" stroke="white" stroke-width="1.5"/>
    <text x="84" y="178" dominant-baseline="central">Date Range</text>
    <!-- Summary -->
    <rect x="58" y="196" width="20" height="20" rx="5" fill="#f59e0b"/>
    <g stroke="white" stroke-width="1.8" stroke-linecap="round"><line x1="63" y1="203" x2="73" y2="203"/><line x1="63" y1="206" x2="73" y2="206"/><line x1="63" y1="209" x2="69" y2="209"/></g>
    <text x="84" y="206" dominant-baseline="central">Summary</text>
    <!-- Image -->
    <rect x="58" y="224" width="20" height="20" rx="5" fill="#06b6d4"/>
    <circle cx="65" cy="230" r="1.6" fill="white"/><polyline points="61,239 68,232 74,239" fill="none" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
    <text x="84" y="234" dominant-baseline="central">Image</text>
    <!-- Table -->
    <rect x="58" y="252" width="20" height="20" rx="5" fill="#ef4444"/>
    <g stroke="white" stroke-width="1.4"><rect x="62" y="256" width="12" height="12" fill="none"/><line x1="62" y1="262" x2="74" y2="262"/><line x1="68" y1="256" x2="68" y2="268"/></g>
    <text x="84" y="262" dominant-baseline="central">Table</text>
    <!-- Accounting -->
    <rect x="58" y="280" width="20" height="20" rx="5" fill="#6366f1"/>
    <g stroke="white" stroke-width="1.6" stroke-linecap="round"><line x1="63" y1="286" x2="73" y2="286"/><line x1="63" y1="290" x2="73" y2="290"/><line x1="63" y1="294" x2="70" y2="294"/></g>
    <text x="84" y="290" dominant-baseline="central">Accounting</text>
  </g>

  <!-- CENTER: canvas -->
  <rect x="160" y="84" width="272" height="380" rx="8" fill="#f1f5f9"/>
  <g filter="url(#rdPage)">
    <rect x="184" y="100" width="224" height="348" rx="3" fill="white"/>
  </g>
  <text x="296" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">Revenue Overview</text>
  <text x="296" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-style="italic" fill="#94a3b8" text-anchor="middle">Period: Jan 2026 to Jul 2026</text>

  <!-- Chart tile 1 (line/area) -->
  <rect x="198" y="158" width="94" height="86" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <polyline points="206,232 222,214 238,224 254,200 270,208 284,182" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="206,232 222,214 238,224 254,200 270,208 284,182 284,240 206,240" fill="#16a34a" opacity="0.12" stroke="none"/>

  <!-- Chart tile 2 (pie) - selected -->
  <rect x="300" y="158" width="94" height="86" rx="4" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="332" cy="201" r="26" fill="#3b82f6"/>
  <path d="M332 201 L332 175 A26 26 0 0 1 353 214 Z" fill="#ef4444"/>
  <rect x="366" y="192" width="6" height="6" rx="1" fill="#3b82f6"/><rect x="366" y="204" width="6" height="6" rx="1" fill="#ef4444"/>
  <!-- selection handles -->
  <g fill="white" stroke="#3b82f6" stroke-width="1.5">
    <rect x="297" y="155" width="6" height="6"/><rect x="391" y="155" width="6" height="6"/>
    <rect x="297" y="241" width="6" height="6"/><rect x="391" y="241" width="6" height="6"/>
  </g>

  <!-- Chart tile 3 (bars) -->
  <rect x="198" y="252" width="94" height="80" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <g fill="#7c3aed"><rect x="212" y="300" width="12" height="22" rx="1"/><rect x="232" y="288" width="12" height="34" rx="1"/><rect x="252" y="294" width="12" height="28" rx="1"/><rect x="272" y="280" width="12" height="42" rx="1"/></g>

  <!-- Table tile -->
  <rect x="300" y="252" width="94" height="80" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="300" y="252" width="94" height="16" rx="4" fill="#334155"/>
  <g stroke="#e2e8f0" stroke-width="1"><line x1="300" y1="284" x2="394" y2="284"/><line x1="300" y1="300" x2="394" y2="300"/><line x1="300" y1="316" x2="394" y2="316"/></g>

  <!-- RIGHT: properties -->
  <rect x="440" y="84" width="112" height="380" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="452" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="0.5" fill="#94a3b8">PAGE SETTINGS</text>
  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="452" y="122" font-size="9.5" fill="#94a3b8">Page Size</text>
    <rect x="452" y="128" width="88" height="22" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="460" y="139" font-size="10.5" font-weight="500" fill="#475569" dominant-baseline="central">A4</text>
    <polyline points="527,136 531,140 535,136" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="452" y="164" font-size="9.5" fill="#94a3b8">Orientation</text>
    <rect x="452" y="170" width="88" height="22" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="460" y="181" font-size="10.5" font-weight="500" fill="#475569" dominant-baseline="central">Landscape</text>
    <polyline points="527,178 531,182 535,178" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="452" y="206" font-size="9.5" fill="#94a3b8">Margins (px)</text>
    <rect x="452" y="212" width="42" height="22" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="460" y="223" font-size="10.5" font-weight="500" fill="#475569" dominant-baseline="central">40</text>
    <rect x="498" y="212" width="42" height="22" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="506" y="223" font-size="10.5" font-weight="500" fill="#475569" dominant-baseline="central">40</text>

    <text x="452" y="248" font-size="9.5" fill="#94a3b8">Background</text>
    <rect x="452" y="254" width="88" height="22" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="457" y="259" width="12" height="12" rx="2" fill="white" stroke="#cbd5e1" stroke-width="1"/>
    <text x="475" y="265" font-size="10" fill="#475569" dominant-baseline="central">#FFFFFF</text>

    <text x="452" y="298" font-size="10" font-weight="700" letter-spacing="0.5" fill="#94a3b8">DISPLAY</text>
    <rect x="452" y="308" width="14" height="14" rx="3" fill="#3b82f6"/>
    <polyline points="455,315 458,318 463,312" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="472" y="315" font-size="10.5" fill="#475569" dominant-baseline="central">Show Header</text>
    <rect x="452" y="332" width="14" height="14" rx="3" fill="#3b82f6"/>
    <polyline points="455,339 458,342 463,336" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="472" y="339" font-size="10.5" fill="#475569" dominant-baseline="central">Show Footer</text>
  </g>
</svg>
