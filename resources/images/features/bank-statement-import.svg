  <rect x="48" y="300" width="504" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="64" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">VISA &#8212; ADOBE</text>
  <text x="64" y="341" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#94a3b8">Jul 6, 2026</text>
  <rect x="280" y="316" width="76" height="24" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="318" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c2410b" text-anchor="middle" dominant-baseline="central">Expense</text>
  <rect x="368" y="316" width="88" height="24" rx="12" fill="#eef2ff" stroke="#e0e7ff" stroke-width="1"/>
  <text x="412" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle" dominant-baseline="central">Software</text>
  <text x="540" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="13.5" font-weight="700" fill="#dc2626" text-anchor="end">&#8722;$29.99</text>

  <!-- Footer -->
  <line x1="48" y1="404" x2="552" y2="404" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" dominant-baseline="central">Review each line, then import them all at once.</text>
  <rect x="392" y="424" width="160" height="34" rx="9" fill="#3b82f6"/>
  <text x="472" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="central">Import 42 transactions</text>
