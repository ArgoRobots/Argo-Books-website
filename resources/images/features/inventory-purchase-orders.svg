  <text x="108" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1e293b" text-anchor="middle">8</text>

  <rect x="176" y="72" width="120" height="62" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
