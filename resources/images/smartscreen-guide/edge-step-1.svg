<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 230" font-family="'Segoe UI Variable','Segoe UI',system-ui,sans-serif" role="img" aria-label="Microsoft Edge Downloads panel with the more options menu next to the installer">
  <defs>
    <filter id="panel-shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="380" height="230" fill="#f3f3f3"/>

  <!-- Floating downloads panel -->
  <rect x="14" y="16" width="352" height="200" rx="12" fill="#ffffff" stroke="#d6d6d6" stroke-width="1" filter="url(#panel-shadow)"/>

  <!-- Header title -->
  <text x="32" y="48" font-size="17" font-weight="700" fill="#1a1a1a">Downloads</text>

  <!-- Header icons (vertically centered at y~44.5) -->
  <g stroke="#3a3a3a" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Folder (smaller) -->
    <g transform="translate(284,36)">
      <path d="M0 3 h5 l2 2 h9 a1.5 1.5 0 0 1 1.5 1.5 v6 a1.5 1.5 0 0 1 -1.5 1.5 H1.5 a1.5 1.5 0 0 1 -1.5 -1.5 V4.5 a1.5 1.5 0 0 1 1.5 -1.5 z"/>
    </g>
    <!-- Search -->
    <g transform="translate(312,38)">
      <circle cx="5.5" cy="5.5" r="5.5"/>
      <line x1="9.5" y1="9.5" x2="13" y2="13"/>
    </g>
  </g>
  <!-- ⋯ (header) -->
  <g transform="translate(338,44)" fill="#3a3a3a">
    <circle cx="0" cy="0" r="1.4"/>
    <circle cx="5" cy="0" r="1.4"/>
    <circle cx="10" cy="0" r="1.4"/>
  </g>

  <!-- Warning entry -->
  <rect x="24" y="72" width="332" height="112" rx="6" fill="#fff8e1" stroke="#f3d98c" stroke-width="1"/>

  <!-- Warning triangle -->
  <g transform="translate(38,90)">
    <path d="M0 24 L13 1 L26 24 Z" fill="#f9c50a" stroke="#a37b00" stroke-width="0.7" stroke-linejoin="round"/>
    <rect x="12" y="7" width="2" height="9" fill="#1a1a1a" rx="1"/>
    <circle cx="13" cy="20" r="1.3" fill="#1a1a1a"/>
  </g>

  <!-- Warning text -->
  <text x="76" y="92" font-size="12.5" fill="#1a1a1a" font-weight="600">Argo Books Installer.exe</text>
  <text x="76" y="116" font-size="11.5" fill="#3a3a3a" font-weight="400">
    <tspan x="76" dy="0">isn't commonly downloaded. Make</tspan>
    <tspan x="76" dy="14">sure you trust Argo Books Installer.exe</tspan>
    <tspan x="76" dy="14">before you open it.</tspan>
  </text>

  <!-- Trash icon -->
  <g transform="translate(286,96)" fill="none" stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="5" x2="18" y2="5"/>
    <path d="M6 5 V3 a2 2 0 0 1 2 -2 h4 a2 2 0 0 1 2 2 v2"/>
    <path d="M4 5 v14 a2 2 0 0 0 2 2 h8 a2 2 0 0 0 2 -2 v-14"/>
  </g>

  <!-- ⋯ button (target — highlighted with blue border + blue dots) -->
  <rect x="318" y="96" width="28" height="24" rx="5" fill="#ffffff" stroke="#0078d4" stroke-width="1.5"/>
  <g transform="translate(326,108)" fill="#0067c0">
    <circle cx="0" cy="0" r="1.6"/>
    <circle cx="6" cy="0" r="1.6"/>
    <circle cx="12" cy="0" r="1.6"/>
  </g>
</svg>
