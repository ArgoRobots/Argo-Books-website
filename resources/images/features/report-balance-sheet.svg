<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="rbsBg" x1="0" y1="0" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="rbsShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="600" height="500" rx="24" fill="url(#rbsBg)"/>
  <g opacity="0.03" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
  </g>
  <circle cx="540" cy="70" r="45" fill="#3b82f6" opacity="0.04"/>
  <circle cx="60" cy="430" r="35" fill="#7c3aed" opacity="0.04"/>

  <g filter="url(#rbsShadow)">
    <rect x="32" y="24" width="536" height="452" rx="16" fill="white"/>
  </g>

  <!-- Branded header -->
  <text x="64" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Your Company</text>
  <text x="64" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Saskatoon, Canada</text>
  <text x="64" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">contact@argorobots.com</text>
  <text x="300" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b" text-anchor="middle">Balance Sheet</text>
  <text x="300" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic" fill="#64748b" text-anchor="middle">As of Jul 3, 2026</text>
  <text x="300" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#94a3b8" text-anchor="middle">Amounts in CAD</text>
  <line x1="48" y1="122" x2="552" y2="122" stroke="#e2e8f0" stroke-width="1"/>

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Title bar -->
    <rect x="48" y="132" width="504" height="26" fill="#334155"/>
    <text x="300" y="145" font-size="12.5" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">Balance Sheet</text>

    <!-- ASSETS header -->
    <rect x="48" y="160" width="504" height="22" fill="#f1f5f9"/>
    <text x="64" y="171" font-size="11" font-weight="700" fill="#334155" dominant-baseline="central">ASSETS</text>
    <text x="536" y="171" font-size="11" font-weight="700" fill="#334155" text-anchor="end" dominant-baseline="central">Amount</text>

    <!-- Current Assets -->
    <text x="64" y="195" font-size="11" font-weight="600" fill="#475569" dominant-baseline="central">Current Assets</text>

    <text x="80" y="217" font-size="11.5" fill="#475569" dominant-baseline="central">Cash (Estimated)</text>
    <text x="536" y="217" font-size="11.5" fill="#334155" text-anchor="end" dominant-baseline="central">($419.02)</text>
    <line x1="64" y1="228" x2="536" y2="228" stroke="#f1f5f9" stroke-width="1"/>

    <text x="80" y="239" font-size="11.5" fill="#475569" dominant-baseline="central">Accounts Receivable</text>
    <text x="536" y="239" font-size="11.5" fill="#334155" text-anchor="end" dominant-baseline="central">$700.84</text>
    <line x1="64" y1="250" x2="536" y2="250" stroke="#f1f5f9" stroke-width="1"/>

    <text x="80" y="261" font-size="11.5" fill="#475569" dominant-baseline="central">Inventory</text>
    <text x="536" y="261" font-size="11.5" fill="#334155" text-anchor="end" dominant-baseline="central">$8.97</text>

    <!-- Total Current Assets -->
    <line x1="64" y1="273" x2="536" y2="273" stroke="#cbd5e1" stroke-width="1"/>
    <text x="64" y="285" font-size="11.5" font-weight="700" fill="#334155" dominant-baseline="central">Total Current Assets</text>
    <text x="536" y="285" font-size="11.5" font-weight="700" fill="#334155" text-anchor="end" dominant-baseline="central">$290.79</text>

    <!-- TOTAL ASSETS -->
    <rect x="48" y="298" width="504" height="24" fill="#334155"/>
    <text x="64" y="310" font-size="11.5" font-weight="700" fill="white" dominant-baseline="central">TOTAL ASSETS</text>
    <text x="536" y="310" font-size="11.5" font-weight="700" fill="white" text-anchor="end" dominant-baseline="central">$290.79</text>

    <!-- LIABILITIES header -->
    <rect x="48" y="326" width="504" height="22" fill="#f1f5f9"/>
    <text x="64" y="337" font-size="11" font-weight="700" fill="#334155" dominant-baseline="central">LIABILITIES</text>

    <text x="80" y="360" font-size="11.5" fill="#475569" dominant-baseline="central">Accounts Payable</text>
    <text x="536" y="360" font-size="11.5" fill="#334155" text-anchor="end" dominant-baseline="central">$0.00</text>
    <line x1="64" y1="371" x2="536" y2="371" stroke="#f1f5f9" stroke-width="1"/>

    <text x="80" y="382" font-size="11.5" fill="#475569" dominant-baseline="central">GST/HST Payable</text>
    <text x="536" y="382" font-size="11.5" fill="#334155" text-anchor="end" dominant-baseline="central">$109.92</text>

    <!-- TOTAL LIABILITIES -->
    <rect x="48" y="394" width="504" height="24" fill="#334155"/>
    <text x="64" y="406" font-size="11.5" font-weight="700" fill="white" dominant-baseline="central">TOTAL LIABILITIES</text>
    <text x="536" y="406" font-size="11.5" font-weight="700" fill="white" text-anchor="end" dominant-baseline="central">$109.92</text>

    <!-- EQUITY header -->
    <rect x="48" y="422" width="504" height="22" fill="#f1f5f9"/>
    <text x="64" y="433" font-size="11" font-weight="700" fill="#334155" dominant-baseline="central">EQUITY</text>

    <text x="80" y="456" font-size="11.5" fill="#475569" dominant-baseline="central">Retained Earnings</text>
    <text x="536" y="456" font-size="11.5" fill="#334155" text-anchor="end" dominant-baseline="central">$180.87</text>
  </g>
</svg>
