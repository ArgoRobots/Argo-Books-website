  <text x="64" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#94a3b8">Jul 3, 2026</text>
  <rect x="280" y="192" width="76" height="24" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="318" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle" dominant-baseline="central">Revenue</text>
