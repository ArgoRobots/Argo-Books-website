  <rect x="280" y="254" width="76" height="24" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="318" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c2410b" text-anchor="middle" dominant-baseline="central">Expense</text>
  <rect x="368" y="254" width="88" height="24" rx="12" fill="#eef2ff" stroke="#e0e7ff" stroke-width="1"/>
  <text x="412" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle" dominant-baseline="central">Office</text>
  <text x="540" y="271" font-family="system-ui, -apple-system, sans-serif" font-size="13.5" font-weight="700" fill="#dc2626" text-anchor="end">&#8722;$64.20</text>

