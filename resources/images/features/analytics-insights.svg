<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="cardShadow2" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="smallShadow2" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" rx="24" fill="url(#bgGrad2)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#8b5cf6" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
  </g>

  <!-- Main card -->
  <g filter="url(#cardShadow2)">
    <rect x="32" y="24" width="536" height="452" rx="16" fill="white"/>
  </g>

  <!-- Title -->
  <text x="56" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#1e293b">Business Insights</text>
  <text x="56" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Based on last 3 months of data</text>

  <!-- Revenue Trends Card -->
  <g filter="url(#smallShadow2)">
    <rect x="48" y="94" width="244" height="180" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  </g>

  <!-- Green trend icon -->
  <rect x="60" y="110" width="28" height="28" rx="7" fill="#ecfdf5"/>
  <path d="M68 130l4-4 2 2 6-6" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M76 122h4v4" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="96" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Revenue Trends</text>

  <!-- Insight 1 -->
  <circle cx="66" cy="156" r="4" fill="#10b981"/>
  <text x="78" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Revenue Growth Detected</text>
  <text x="78" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Your revenue has increased by 41.9%</text>
  <text x="78" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">compared to the previous period.</text>
  <text x="78" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#3b82f6">Consider analyzing which products</text>
  <text x="78" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#3b82f6">drove this growth to replicate success.</text>

  <!-- Insight 2 -->
  <circle cx="66" cy="234" r="4" fill="#f59e0b"/>
  <text x="78" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Expense Increase Detected</text>
  <text x="78" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Expenses rose 18.2% while revenue grew</text>
  <text x="78" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">41.9%. Monitor for cost optimization.</text>

  <!-- Anomaly Detection Card -->
  <g filter="url(#smallShadow2)">
    <rect x="308" y="94" width="244" height="180" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  </g>

  <!-- Warning icon -->
  <rect x="320" y="110" width="28" height="28" rx="7" fill="#fef3c7"/>
  <path d="M334 120l8 14h-16z" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <line x1="334" y1="126" x2="334" y2="130" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="334" cy="133" r="1" fill="#f59e0b"/>

  <text x="356" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Anomaly Detection</text>

  <!-- Anomaly item -->
  <circle cx="326" cy="156" r="4" fill="#f59e0b"/>
  <text x="338" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Return Rate Above Normal</text>
  <text x="338" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Current return rate is 21.7% compared</text>
  <text x="338" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">to historical average of 0.0%.</text>
  <text x="338" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Most returns are for:</text>
  <text x="338" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#1e293b">SecureGate MX68 Firewall</text>
  <text x="338" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ef4444">Investigate product quality, description</text>
  <text x="338" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ef4444">accuracy, or shipping issues.</text>

  <!-- Opportunities Card -->
  <g filter="url(#smallShadow2)">
    <rect x="48" y="290" width="504" height="170" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  </g>

  <!-- Star icon -->
  <rect x="60" y="306" width="28" height="28" rx="7" fill="#eff6ff"/>
  <path d="M74 312l2 4 4.5 0.7-3.25 3.2 0.75 4.6L74 322.2l-4 2.3 0.75-4.6-3.25-3.2 4.5-0.7z" fill="#3b82f6"/>

  <text x="96" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Opportunities</text>

  <!-- Opportunity items -->
  <circle cx="66" cy="354" r="4" fill="#3b82f6"/>
  <text x="78" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b">High-Margin Products Identified</text>
  <text x="78" y="366" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">3 products have profit margins above 60%. Consider increasing inventory or marketing spend on these items.</text>

  <circle cx="66" cy="390" r="4" fill="#3b82f6"/>
  <text x="78" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Seasonal Peak Approaching</text>
  <text x="78" y="402" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Based on historical patterns, Mar-Apr is your peak revenue period. Consider stocking up and preparing marketing campaigns.</text>

  <circle cx="66" cy="426" r="4" fill="#3b82f6"/>
  <text x="78" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Customer Retention Opportunity</text>
  <text x="78" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">You have repeat customers with high order frequency. Consider a loyalty or discount program to reward and retain them.</text>

  <!-- Summary badges at top right -->
  <rect x="350" y="40" width="60" height="26" rx="6" fill="#eff6ff"/>
  <text x="380" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">9 AI</text>

  <rect x="416" y="40" width="60" height="26" rx="6" fill="#ecfdf5"/>
  <text x="446" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#10b981" text-anchor="middle">5 Trends</text>

  <rect x="482" y="40" width="60" height="26" rx="6" fill="#fef3c7"/>
  <text x="512" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#f59e0b" text-anchor="middle">1 Alert</text>
</svg>