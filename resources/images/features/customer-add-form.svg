<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="600" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="580" rx="24" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="580"/><line x1="200" y1="0" x2="200" y2="580"/>
    <line x1="300" y1="0" x2="300" y2="580"/><line x1="400" y1="0" x2="400" y2="580"/>
    <line x1="500" y1="0" x2="500" y2="580"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="35" fill="#3b82f6" opacity="0.04"/>
  <circle cx="530" cy="520" r="40" fill="#ef4444" opacity="0.04"/>

  <!-- Main card / Modal -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="24" width="480" height="532" rx="16" fill="white"/>
  </g>

  <!-- Modal header -->
  <text x="84" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Add Customer</text>
  <!-- Close X -->
  <line x1="514" y1="40" x2="524" y2="50" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="524" y1="40" x2="514" y2="50" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <!-- Divider -->
  <line x1="60" y1="72" x2="540" y2="72" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row 1: ID, First Name, Last Name -->
  <text x="84" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">ID</text>
  <rect x="84" y="106" width="80" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">CUS-xxx</text>

  <text x="180" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">First Name <tspan fill="#ef4444">*</tspan></text>
  <rect x="180" y="106" width="160" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="192" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter first name</text>

  <text x="356" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Last Name <tspan fill="#ef4444">*</tspan></text>
  <rect x="356" y="106" width="160" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="368" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter last name</text>

  <!-- Row 2: Company -->
  <text x="84" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Company</text>
  <rect x="84" y="166" width="432" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter company name</text>

  <!-- Row 3: Email + Phone -->
  <text x="84" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Email</text>
  <rect x="84" y="224" width="200" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter email address</text>

  <text x="300" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Phone</text>
  <rect x="300" y="224" width="56" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="312" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">+1</text>
  <path d="M342 240l4-4 4 4" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" transform="rotate(180,346,238)"/>
  <rect x="362" y="224" width="154" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="374" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">(123) 456-7890</text>

  <!-- Address Section Header -->
  <text x="84" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Address</text>
  <line x1="130" y1="276" x2="516" y2="276" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Street Address -->
  <text x="84" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Street Address</text>
  <rect x="84" y="310" width="432" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="329" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter street address</text>

  <!-- City + State -->
  <text x="84" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">City</text>
  <rect x="84" y="368" width="208" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter city</text>

  <text x="308" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">State/Province</text>
  <rect x="308" y="368" width="208" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter state</text>

  <!-- Postal Code + Country -->
  <text x="84" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Postal Code</text>
  <rect x="84" y="426" width="208" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Enter postal code</text>

  <text x="308" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Country</text>
  <rect x="308" y="426" width="208" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Select country</text>
  <path d="M500 440l4-4 4 4" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" transform="rotate(180,504,438)"/>

  <!-- Notes -->
  <text x="84" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#3b82f6">Notes</text>
  <line x1="118" y1="474" x2="516" y2="474" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bottom buttons -->
  <rect x="338" y="496" width="80" height="34" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="378" y="517" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b" text-anchor="middle">Cancel</text>

  <rect x="428" y="496" width="88" height="34" rx="8" fill="#3b82f6"/>
  <text x="472" y="517" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Add Customer</text>
</svg>
