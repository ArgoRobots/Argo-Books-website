    <line x1="58" y1="58" x2="74" y2="58"/>
    <polyline points="60,54 66,50 72,54"/>
    <line x1="60" y1="58" x2="60" y2="64"/><line x1="72" y1="58" x2="72" y2="64"/>
    <line x1="66" y1="58" x2="66" y2="64"/>
  </g>
  <text x="92" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Import Bank Statement</text>
  <text x="92" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">chase_statement.pdf &#8212; 42 transactions</text>

  <!-- AI badge -->
  <rect x="424" y="38" width="114" height="24" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <path d="M439 43 L433 51 L437 51 L435 59 L443 49 L438 49 L440 43 Z" fill="#7c3aed"/>
  <text x="452" y="50.5" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="600" fill="#7c3aed" dominant-baseline="central">AI categorized</text>

