<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="rtBg" x1="0" y1="0" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="rtShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="600" height="500" rx="24" fill="url(#rtBg)"/>
  <g opacity="0.03" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
  </g>
  <circle cx="540" cy="70" r="45" fill="#16a34a" opacity="0.04"/>
  <circle cx="60" cy="430" r="35" fill="#3b82f6" opacity="0.04"/>

  <g filter="url(#rtShadow)">
    <rect x="32" y="24" width="536" height="452" rx="16" fill="white"/>
  </g>

  <!-- Header -->
  <text x="64" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">New Report</text>
  <text x="64" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#64748b">Choose a template to start from</text>
  <rect x="440" y="48" width="112" height="24" rx="12" fill="#eff6ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="496" y="60.5" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="600" fill="#3b82f6" text-anchor="middle" dominant-baseline="central">Step 1 of 3</text>
  <line x1="48" y1="100" x2="552" y2="100" stroke="#f1f5f9" stroke-width="1"/>

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Card 1: Income Statement -->
    <rect x="48" y="116" width="244" height="88" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="64" y="138" width="44" height="44" rx="10" fill="#16a34a"/>
    <polyline points="73,169 82,159 88,165 99,153" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="94,153 99,153 99,158" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="122" y="156" font-size="14" font-weight="700" fill="#1e293b">Income Statement</text>
    <text x="122" y="178" font-size="10.5" fill="#94a3b8">Did you make or lose money</text>

    <!-- Card 2: Balance Sheet -->
    <rect x="308" y="116" width="244" height="88" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="324" y="138" width="44" height="44" rx="10" fill="#3b82f6"/>
    <rect x="335" y="163" width="6" height="8" rx="1" fill="white"/><rect x="343" y="156" width="6" height="15" rx="1" fill="white"/><rect x="351" y="160" width="6" height="11" rx="1" fill="white"/>
    <text x="382" y="156" font-size="14" font-weight="700" fill="#1e293b">Balance Sheet</text>
    <text x="382" y="178" font-size="10.5" fill="#94a3b8">What you own and owe</text>

    <!-- Card 3: Cash Flow -->
    <rect x="48" y="218" width="244" height="88" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="64" y="240" width="44" height="44" rx="10" fill="#7c3aed"/>
    <g stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="81" y1="272" x2="81" y2="256"/><polyline points="77,260 81,256 85,260"/>
      <line x1="91" y1="256" x2="91" y2="272"/><polyline points="87,268 91,272 95,268"/>
    </g>
    <text x="122" y="258" font-size="14" font-weight="700" fill="#1e293b">Cash Flow</text>
    <text x="122" y="280" font-size="10.5" fill="#94a3b8">Money in and money out</text>

    <!-- Card 4: General Ledger -->
    <rect x="308" y="218" width="244" height="88" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="324" y="240" width="44" height="44" rx="10" fill="#f59e0b"/>
    <g stroke="white" stroke-width="2" stroke-linecap="round"><line x1="342" y1="258" x2="356" y2="258"/><line x1="342" y1="264" x2="356" y2="264"/><line x1="342" y1="270" x2="351" y2="270"/></g>
    <circle cx="337" cy="258" r="1.4" fill="white"/><circle cx="337" cy="264" r="1.4" fill="white"/><circle cx="337" cy="270" r="1.4" fill="white"/>
    <text x="382" y="258" font-size="14" font-weight="700" fill="#1e293b">General Ledger</text>
    <text x="382" y="280" font-size="10.5" fill="#94a3b8">Every transaction, in order</text>

    <!-- Card 5: AR Aging -->
    <rect x="48" y="320" width="244" height="88" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="64" y="342" width="44" height="44" rx="10" fill="#ef4444"/>
    <circle cx="86" cy="364" r="11" fill="none" stroke="white" stroke-width="2"/>
    <g stroke="white" stroke-width="2" stroke-linecap="round"><line x1="86" y1="364" x2="86" y2="358"/><line x1="86" y1="364" x2="90" y2="366"/></g>
    <text x="122" y="360" font-size="14" font-weight="700" fill="#1e293b">AR Aging</text>
    <text x="122" y="382" font-size="10.5" fill="#94a3b8">Who owes you, and for how long</text>

    <!-- Card 6: Tax Summary -->
    <rect x="308" y="320" width="244" height="88" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="324" y="342" width="44" height="44" rx="10" fill="#06b6d4"/>
    <text x="346" y="365" font-size="19" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">%</text>
    <text x="382" y="360" font-size="14" font-weight="700" fill="#1e293b">Tax Summary</text>
    <text x="382" y="382" font-size="10.5" fill="#94a3b8">Tax collected and paid</text>
  </g>

  <!-- Footer note -->
  <line x1="48" y1="428" x2="552" y2="428" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" dominant-baseline="central">Plus Sales by Product, analytics templates, or a blank report.</text>
</svg>
