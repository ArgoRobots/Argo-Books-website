name: Deploy to server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Remove passphrase from key so lftp can use it non-interactively
          ssh-keygen -p -f ~/.ssh/deploy_key -P "${{ secrets.SSH_PASSPHRASE }}" -N ""
          ssh-keyscan -T 10 ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}," \
            -e "set sftp:connect-program 'ssh -a -x -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no'; \
                mirror --reverse --delete --verbose \
                  --exclude ^\.git/$ \
                  --exclude ^\.github/$ \
                  --exclude ^\.gitignore$ \
                  --exclude ^README\.md$ \
                  --exclude ^read-me/$ \
                  --exclude ^composer\.json$ \
                  --exclude ^composer\.lock$ \
                  --exclude ^mysql_schema\.sql$ \
                  --exclude ^\.ftp-deploy-sync-state\.json$ \
                  ./ ${{ secrets.FTP_SERVER_DIR }}; \
                bye" \
            sftp://${{ secrets.FTP_SERVER }}
