  <text x="64" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" fill="#94a3b8">TRANSACTION</text>
  <text x="318" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" fill="#94a3b8" text-anchor="middle">TYPE</text>
